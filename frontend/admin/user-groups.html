<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Turf - User Groups & Permissions</title>
    <link rel="stylesheet" href="/src/css/tailwind.generated.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link rel="stylesheet" href="/src/css/pages/style.css">
    <link rel="stylesheet" href="admin.css">
    <script src="admin-layout.js" defer></script>
    <script src="user-groups.js" defer></script>
</head>

<body data-3d-enabled="true" class="text-white font-sans antialiased overflow-hidden">
    <!-- 3D Background -->
    <div id="three-container" class="fixed inset-0 -z-50"></div>

    <div id="app-container" class="flex h-screen overflow-hidden relative z-10">
        <aside id="sidebar-container" class="w-64 iphone-glass border-r border-white/5 hidden md:flex flex-col"></aside>
        <div class="flex-1 flex flex-col overflow-hidden">
            <header id="topbar-container" class="h-16 iphone-glass border-b border-white/5 flex items-center justify-between px-6"></header>
            <main class="flex-1 overflow-x-hidden overflow-y-auto p-6">
                <!-- Header -->
                <div class="mb-8">
                    <div class="flex justify-between items-center mb-6">
                        <div>
                            <h1 class="text-2xl font-black tracking-tight">User Groups & Permissions</h1>
                            <p class="text-gray-400 text-sm mt-1">Manage user groups and their permissions</p>
                        </div>
                        <button onclick="openGroupModal()" class="iphone-glass text-white px-6 py-2 rounded-xl flex items-center hover:bg-white/10 transition-all font-bold">
                            <i data-lucide="plus" class="w-4 h-4 mr-2"></i> Create Group
                        </button>
                    </div>
                </div>

                <!-- Group Stats -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                    <div class="iphone-glass rounded-2xl p-4 border border-white/5">
                        <div class="flex items-center justify-between mb-2">
                            <h3 class="text-gray-400 text-xs font-bold uppercase">Total Groups</h3>
                            <i data-lucide="users-2" class="w-4 h-4 text-blue-500"></i>
                        </div>
                        <p class="text-2xl font-black text-white" id="stat-total-groups">0</p>
                    </div>
                    <div class="iphone-glass rounded-2xl p-4 border border-white/5">
                        <div class="flex items-center justify-between mb-2">
                            <h3 class="text-gray-400 text-xs font-bold uppercase">Total Members</h3>
                            <i data-lucide="users" class="w-4 h-4 text-green-500"></i>
                        </div>
                        <p class="text-2xl font-black text-white" id="stat-total-members">0</p>
                    </div>
                    <div class="iphone-glass rounded-2xl p-4 border border-white/5">
                        <div class="flex items-center justify-between mb-2">
                            <h3 class="text-gray-400 text-xs font-bold uppercase">Active Groups</h3>
                            <i data-lucide="check-circle" class="w-4 h-4 text-purple-500"></i>
                        </div>
                        <p class="text-2xl font-black text-white" id="stat-active-groups">0</p>
                    </div>
                </div>

                <!-- Groups Table -->
                <div class="iphone-glass rounded-[2rem] border border-white/5 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="iphone-glass text-white/50 text-[10px] uppercase tracking-[0.2em]">
                                    <th class="p-4 font-bold">Group Name</th>
                                    <th class="p-4 font-bold">Description</th>
                                    <th class="p-4 font-bold">Members</th>
                                    <th class="p-4 font-bold">Permissions</th>
                                    <th class="p-4 font-bold text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="groups-tbody" class="divide-y divide-white/5 text-sm">
                                <!-- Groups will be loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Group Modal -->
    <div id="group-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div class="iphone-glass rounded-[2rem] p-8 w-full max-w-2xl border border-white/10 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 id="modal-title" class="text-xl font-black tracking-tight text-white uppercase">Create User Group</h3>
                <button onclick="closeGroupModal()" class="w-10 h-10 iphone-glass rounded-xl flex items-center justify-center text-gray-400 hover:text-white transition-all">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>

            <form id="group-form" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-white mb-2 text-sm font-bold">Group Name *</label>
                        <input type="text" name="name" required class="w-full iphone-glass border border-white/10 rounded-xl px-4 py-3 text-sm bg-white/5 text-white placeholder-gray-500 focus:bg-white/10">
                    </div>
                    <div>
                        <label class="block text-white mb-2 text-sm font-bold">Status</label>
                        <select name="status" class="w-full iphone-glass border border-white/10 rounded-xl px-4 py-3 text-sm bg-white/5 text-white">
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-white mb-2 text-sm font-bold">Description</label>
                    <textarea name="description" rows="3" class="w-full iphone-glass border border-white/10 rounded-xl px-4 py-3 text-sm bg-white/5 text-white placeholder-gray-500 focus:bg-white/10"></textarea>
                </div>

                <div>
                    <label class="block text-white mb-2 text-sm font-bold">Permissions</label>
                    <div class="space-y-3">
                        <div class="flex items-center">
                            <input type="checkbox" name="permissions" value="users.view" class="rounded border-white/20 mr-3">
                            <label class="text-sm text-white">View Users</label>
                        </div>
                        <div class="flex items-center">
                            <input type="checkbox" name="permissions" value="users.edit" class="rounded border-white/20 mr-3">
                            <label class="text-sm text-white">Edit Users</label>
                        </div>
                        <div class="flex items-center">
                            <input type="checkbox" name="permissions" value="products.view" class="rounded border-white/20 mr-3">
                            <label class="text-sm text-white">View Products</label>
                        </div>
                        <div class="flex items-center">
                            <input type="checkbox" name="permissions" value="products.edit" class="rounded border-white/20 mr-3">
                            <label class="text-sm text-white">Edit Products</label>
                        </div>
                        <div class="flex items-center">
                            <input type="checkbox" name="permissions" value="orders.view" class="rounded border-white/20 mr-3">
                            <label class="text-sm text-white">View Orders</label>
                        </div>
                        <div class="flex items-center">
                            <input type="checkbox" name="permissions" value="orders.edit" class="rounded border-white/20 mr-3">
                            <label class="text-sm text-white">Edit Orders</label>
                        </div>
                        <div class="flex items-center">
                            <input type="checkbox" name="permissions" value="analytics.view" class="rounded border-white/20 mr-3">
                            <label class="text-sm text-white">View Analytics</label>
                        </div>
                        <div class="flex items-center">
                            <input type="checkbox" name="permissions" value="settings.edit" class="rounded border-white/20 mr-3">
                            <label class="text-sm text-white">Edit Settings</label>
                        </div>
                    </div>
                </div>

                <div class="flex justify-end gap-4 pt-6 border-t border-white/10">
                    <button type="button" onclick="closeGroupModal()" class="px-6 py-3 rounded-xl text-gray-400 hover:text-white transition-all">
                        Cancel
                    </button>
                    <button type="submit" class="px-6 py-3 rounded-xl bg-[#F26522] text-white font-bold hover:bg-[#d45a1e] transition-all">
                        Save Group
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
