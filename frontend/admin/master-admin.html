<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Turf - Master Admin Panel</title>
    <link rel="stylesheet" href="/src/css/tailwind.generated.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/src/css/pages/style.css">
    <link rel="stylesheet" href="admin.css">
    <script src="admin-layout.js" defer></script>
    <script src="master-admin.js" defer></script>
</head>

<body data-3d-enabled="true" class="text-white font-sans antialiased overflow-hidden">
    <div id="three-container" class="fixed inset-0 -z-50"></div>

    <div id="app-container" class="flex h-screen overflow-hidden relative z-10">
        <aside id="sidebar-container" class="w-64 iphone-glass border-r border-white/5 hidden md:flex flex-col"></aside>

        <div class="flex-1 flex flex-col overflow-hidden">
            <header id="topbar-container" class="h-16 iphone-glass border-b border-white/5 flex items-center justify-between px-6"></header>

            <main class="flex-1 overflow-x-hidden overflow-y-auto p-6 space-y-6">
                <section class="iphone-glass rounded-2xl border border-white/10 p-5">
                    <div class="flex flex-wrap items-center justify-between gap-3">
                        <div>
                            <h2 class="text-xl font-black tracking-tight">Unified Website Access</h2>
                            <p class="text-sm text-white/60 mt-1">Single control panel for all projects and admin tools.</p>
                        </div>
                        <div class="flex gap-2">
                            <a href="ops-center.html" class="px-3 py-2 rounded-lg bg-white/10 hover:bg-white/20 text-xs font-bold uppercase tracking-[0.12em]">Open Ops Center</a>
                            <button id="refreshMasterHealth" class="px-3 py-2 rounded-lg bg-white/10 hover:bg-white/20 text-xs font-bold uppercase tracking-[0.12em]">Refresh Status</button>
                        </div>
                    </div>
                </section>

                <section id="projectGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                    <article class="iphone-glass rounded-2xl border border-white/10 p-5">
                        <p class="text-white/60 text-sm">Loading websites...</p>
                    </article>
                </section>

                <section class="iphone-glass rounded-2xl border border-white/10 overflow-hidden">
                    <div class="px-5 py-4 border-b border-white/10 flex items-center justify-between">
                        <h3 class="font-black tracking-tight">Quick Actions</h3>
                        <span class="text-xs text-white/50">Admin-only commands</span>
                    </div>
                    <div class="p-5 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3" id="masterQuickActions">
                        <button data-command-id="start_all_sites" class="text-left rounded-xl border border-white/15 bg-white/5 hover:bg-white/10 p-4">
                            <p class="text-sm font-bold">Start All Websites</p>
                            <p class="text-xs text-white/60 mt-1">Run startup batch.</p>
                        </button>
                        <button data-command-id="stop_all_sites" class="text-left rounded-xl border border-white/15 bg-white/5 hover:bg-white/10 p-4">
                            <p class="text-sm font-bold">Stop All Websites</p>
                            <p class="text-xs text-white/60 mt-1">Run stop batch.</p>
                        </button>
                        <button data-command-id="restart_unified_backend" class="text-left rounded-xl border border-white/15 bg-white/5 hover:bg-white/10 p-4">
                            <p class="text-sm font-bold">Restart Backend</p>
                            <p class="text-xs text-white/60 mt-1">Restart unified API.</p>
                        </button>
                        <button data-command-id="clear_npm_cache" class="text-left rounded-xl border border-white/15 bg-white/5 hover:bg-white/10 p-4">
                            <p class="text-sm font-bold">Clear NPM Cache</p>
                            <p class="text-xs text-white/60 mt-1">Fix package issues.</p>
                        </button>
                    </div>
                </section>

                <section class="iphone-glass rounded-2xl border border-white/10 overflow-hidden">
                    <div class="px-5 py-4 border-b border-white/10 flex items-center justify-between">
                        <h3 class="font-black tracking-tight">Master Activity</h3>
                        <button id="clearMasterLog" class="px-3 py-1.5 text-xs rounded-lg bg-white/10 hover:bg-white/20">Clear</button>
                    </div>
                    <pre id="masterOutput" class="p-5 text-xs whitespace-pre-wrap text-green-300 min-h-[140px] max-h-[280px] overflow-auto">Master panel ready.</pre>
                </section>
            </main>
        </div>
    </div>
</body>

</html>
