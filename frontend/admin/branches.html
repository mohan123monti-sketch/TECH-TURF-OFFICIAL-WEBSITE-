<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Turf - Branch Management</title>
    <link rel="stylesheet" href="/src/css/tailwind.generated.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link rel="stylesheet" href="/src/css/pages/style.css">
    <link rel="stylesheet" href="admin.css">
    <script src="admin-layout.js" defer></script>
    <script src="branches.js" defer></script>
</head>

<body data-3d-enabled="true" class="text-white font-sans antialiased overflow-hidden">
    <!-- 3D Background -->
    <div id="three-container" class="fixed inset-0 -z-50"></div>

    <div id="app-container" class="flex h-screen overflow-hidden relative z-10">
        <aside id="sidebar-container" class="w-64 iphone-glass border-r border-white/5 hidden md:flex flex-col"></aside>
        <div class="flex-1 flex flex-col overflow-hidden">
            <header id="topbar-container" class="h-16 iphone-glass border-b border-white/5 flex items-center justify-between px-6"></header>
            <main class="flex-1 overflow-x-hidden overflow-y-auto p-6">
                <!-- Header -->
                <div class="mb-8">
                    <div class="flex justify-between items-center mb-6">
                        <div>
                            <h1 class="text-2xl font-black tracking-tight">Branch Management</h1>
                            <p class="text-gray-400 text-sm mt-1">Manage multiple branches and inventory locations</p>
                        </div>
                        <button onclick="openBranchModal()" class="iphone-glass text-white px-6 py-2 rounded-xl flex items-center hover:bg-white/10 transition-all font-bold">
                            <i data-lucide="plus" class="w-4 h-4 mr-2"></i> Add Branch
                        </button>
                    </div>
                </div>

                <!-- Branch Stats -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                    <div class="iphone-glass rounded-2xl p-4 border border-white/5">
                        <div class="flex items-center justify-between mb-2">
                            <h3 class="text-gray-400 text-xs font-bold uppercase">Total Branches</h3>
                            <i data-lucide="building-2" class="w-4 h-4 text-blue-500"></i>
                        </div>
                        <p class="text-2xl font-black text-white" id="stat-total-branches">0</p>
                    </div>
                    <div class="iphone-glass rounded-2xl p-4 border border-white/5">
                        <div class="flex items-center justify-between mb-2">
                            <h3 class="text-gray-400 text-xs font-bold uppercase">Active Branches</h3>
                            <i data-lucide="check-circle" class="w-4 h-4 text-green-500"></i>
                        </div>
                        <p class="text-2xl font-black text-white" id="stat-active-branches">0</p>
                    </div>
                    <div class="iphone-glass rounded-2xl p-4 border border-white/5">
                        <div class="flex items-center justify-between mb-2">
                            <h3 class="text-gray-400 text-xs font-bold uppercase">Low Stock Items</h3>
                            <i data-lucide="alert-triangle" class="w-4 h-4 text-yellow-500"></i>
                        </div>
                        <p class="text-2xl font-black text-white" id="stat-low-stock-items">0</p>
                    </div>
                    <div class="iphone-glass rounded-2xl p-4 border border-white/5">
                        <div class="flex items-center justify-between mb-2">
                            <h3 class="text-gray-400 text-xs font-bold uppercase">Total Inventory Value</h3>
                            <i data-lucide="trending-up" class="w-4 h-4 text-purple-500"></i>
                        </div>
                        <p class="text-2xl font-black text-white" id="stat-inventory-value">INR 0</p>
                    </div>
                </div>

                <!-- Branches Table -->
                <div class="iphone-glass rounded-[2rem] border border-white/5 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="iphone-glass text-white/50 text-[10px] uppercase tracking-[0.2em]">
                                    <th class="p-4 font-bold">Branch Name</th>
                                    <th class="p-4 font-bold">Manager</th>
                                    <th class="p-4 font-bold">Contact</th>
                                    <th class="p-4 font-bold">Products</th>
                                    <th class="p-4 font-bold">Total Stock</th>
                                    <th class="p-4 font-bold">Status</th>
                                    <th class="p-4 font-bold text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="branches-tbody" class="divide-y divide-white/5 text-sm">
                                <!-- Branches will be loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Branch Modal -->
    <div id="branch-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div class="iphone-glass rounded-[2rem] p-8 w-full max-w-md border border-white/10 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 id="modal-title" class="text-xl font-black tracking-tight text-white uppercase">Add Branch</h3>
                <button onclick="closeBranchModal()" class="w-10 h-10 iphone-glass rounded-xl flex items-center justify-center text-gray-400 hover:text-white transition-all">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>

            <form id="branch-form" class="space-y-4">
                <div>
                    <label class="block text-white mb-2 text-sm font-bold">Branch Name *</label>
                    <input type="text" name="name" required class="w-full iphone-glass border border-white/10 rounded-xl px-4 py-3 text-sm bg-white/5 text-white placeholder-gray-500 focus:bg-white/10">
                </div>
                <div>
                    <label class="block text-white mb-2 text-sm font-bold">Address</label>
                    <textarea name="address" rows="3" class="w-full iphone-glass border border-white/10 rounded-xl px-4 py-3 text-sm bg-white/5 text-white placeholder-gray-500 focus:bg-white/10"></textarea>
                </div>
                <div>
                    <label class="block text-white mb-2 text-sm font-bold">Phone</label>
                    <input type="tel" name="phone" class="w-full iphone-glass border border-white/10 rounded-xl px-4 py-3 text-sm bg-white/5 text-white placeholder-gray-500 focus:bg-white/10">
                </div>
                <div>
                    <label class="block text-white mb-2 text-sm font-bold">Email</label>
                    <input type="email" name="email" class="w-full iphone-glass border border-white/10 rounded-xl px-4 py-3 text-sm bg-white/5 text-white placeholder-gray-500 focus:bg-white/10">
                </div>
                <div>
                    <label class="block text-white mb-2 text-sm font-bold">Status</label>
                    <select name="status" class="w-full iphone-glass border border-white/10 rounded-xl px-4 py-3 text-sm bg-white/5 text-white">
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                    </select>
                </div>
                <div class="flex justify-end gap-4 pt-4 border-t border-white/10">
                    <button type="button" onclick="closeBranchModal()" class="px-6 py-3 rounded-xl text-gray-400 hover:text-white transition-all">
                        Cancel
                    </button>
                    <button type="submit" class="px-6 py-3 rounded-xl bg-[#F26522] text-white font-bold hover:bg-[#d45a1e] transition-all">
                        Save Branch
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
