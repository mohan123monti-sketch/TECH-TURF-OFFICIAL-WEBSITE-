<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Turf - Admin Announcements</title>
    <link rel="stylesheet" href="/src/css/tailwind.generated.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link rel="stylesheet" href="/src/css/pages/style.css">
    <script src="admin-layout.js" defer></script>
    <script src="announcements.js" defer></script>
</head>

<body data-3d-enabled="true" class="text-white font-sans antialiased overflow-hidden">
    <!-- 3D Background -->
    <div id="three-container" class="fixed inset-0 -z-50"></div>

    <div id="app-container" class="flex h-screen overflow-hidden relative z-10">
        <aside id="sidebar-container" class="w-64 iphone-glass border-r border-white/5 hidden md:flex flex-col"></aside>
        <div class="flex-1 flex flex-col overflow-hidden">
            <header id="topbar-container"
                class="h-16 iphone-glass border-b border-white/5 flex items-center justify-between px-6"></header>
            <main class="flex-1 overflow-x-hidden overflow-y-auto p-6">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <h1 class="text-2xl font-black tracking-tight">System Announcements</h1>
                        <p class="text-gray-400 text-sm mt-1">Send important notifications to users</p>
                    </div>
                    <button onclick="openCreateModal()"
                        class="iphone-glass text-white px-6 py-2 rounded-xl flex items-center hover:bg-white/10 transition-all font-bold">
                        <i data-lucide="plus" class="w-4 h-4 mr-2"></i> New Announcement
                    </button>
                </div>

                <!-- Filter -->
                <div class="mb-6 flex gap-4 items-center">
                    <select id="filter-status" onchange="filterAnnouncements()"
                        class="iphone-glass border border-white/10 rounded-xl px-4 py-2 text-sm bg-white/5 text-white">
                        <option value="">All Status</option>
                        <option value="active">Active</option>
                        <option value="scheduled">Scheduled</option>
                        <option value="archived">Archived</option>
                    </select>
                </div>

                <!-- Announcements List -->
                <div id="announcements-list" class="space-y-4">
                    <!-- Announcements loaded via JS -->
                    <div class="text-center py-12 text-gray-400">
                        <i data-lucide="megaphone" class="w-12 h-12 mx-auto mb-4 opacity-50"></i>
                        <p>No announcements yet</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div id="announcement-modal"
        class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4 overflow-y-auto">
        <div class="iphone-glass rounded-[2rem] p-8 w-full max-w-2xl border border-white/10 shadow-2xl my-auto">
            <div class="flex justify-between items-center mb-8">
                <h3 id="modal-title" class="text-xl font-black text-white tracking-tight">New Announcement</h3>
                <button onclick="closeCreateModal()"
                    class="w-10 h-10 iphone-glass rounded-xl flex items-center justify-center text-gray-400 hover:text-white transition-all">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>

            <form id="announcement-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Title</label>
                    <input type="text" id="announcement-title" required
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:bg-white/10 transition-all outline-none">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Content</label>
                    <textarea id="announcement-content" rows="6" required
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:bg-white/10 transition-all outline-none"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">Type</label>
                        <select id="announcement-type"
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:bg-white/10 transition-all outline-none appearance-none">
                            <option value="info">Info</option>
                            <option value="warning">Warning</option>
                            <option value="success">Success</option>
                            <option value="error">Error</option>
                            <option value="maintenance">Maintenance</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">Priority</label>
                        <select id="announcement-priority"
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:bg-white/10 transition-all outline-none appearance-none">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                            <option value="critical">Critical</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">Start Date & Time</label>
                        <input type="datetime-local" id="start-datetime"
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:bg-white/10 transition-all outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">End Date & Time</label>
                        <input type="datetime-local" id="end-datetime"
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:bg-white/10 transition-all outline-none">
                    </div>
                </div>

                <div class="flex items-center gap-3">
                    <input type="checkbox" id="notify-users" checked class="accent-orange-500">
                    <label class="text-sm text-gray-400">Notify all users</label>
                </div>

                <div class="flex gap-4">
                    <button type="submit" id="save-btn"
                        class="flex-1 bg-white text-black font-bold py-3 rounded-xl hover:bg-gray-200 transition-all">
                        Save Announcement
                    </button>
                    <button type="button" onclick="closeCreateModal()"
                        class="flex-1 bg-white/10 border border-white/10 text-white font-bold py-3 rounded-xl hover:bg-white/20 transition-all">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
