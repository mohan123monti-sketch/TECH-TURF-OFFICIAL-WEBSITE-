<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Turf - Media Library</title>
    <link rel="stylesheet" href="/src/css/tailwind.generated.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link rel="stylesheet" href="/src/css/pages/style.css">
    <script src="admin-layout.js" defer></script>
    <script src="media.js" defer></script>
</head>

<body data-3d-enabled="true" class="text-white font-sans antialiased overflow-hidden">
    <!-- 3D Background -->
    <div id="three-container" class="fixed inset-0 -z-50"></div>

    <div id="app-container" class="flex h-screen overflow-hidden relative z-10">
        <aside id="sidebar-container" class="w-64 iphone-glass border-r border-white/5 hidden md:flex flex-col"></aside>
        <div class="flex-1 flex flex-col overflow-hidden">
            <header id="topbar-container"
                class="h-16 iphone-glass border-b border-white/5 flex items-center justify-between px-6"></header>
            <main class="flex-1 overflow-x-hidden overflow-y-auto p-6">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <h1 class="text-2xl font-black tracking-tight">Media Library</h1>
                        <p class="text-gray-400 text-sm mt-1">Manage product images and media files</p>
                    </div>
                    <button onclick="openUploadModal()"
                        class="iphone-glass text-white px-6 py-2 rounded-xl flex items-center hover:bg-white/10 transition-all font-bold">
                        <i data-lucide="upload" class="w-4 h-4 mr-2"></i> Upload Files
                    </button>
                </div>

                <!-- Filter and Search -->
                <div class="mb-6 flex gap-4 items-center flex-wrap">
                    <div class="flex-1 min-w-[200px]">
                        <input type="text" id="search-media" placeholder="Search media..."
                            class="w-full iphone-glass border border-white/10 rounded-xl px-4 py-2 text-sm bg-white/5 text-white placeholder-gray-500 focus:bg-white/10">
                    </div>
                    <select id="filter-type" onchange="filterMedia()"
                        class="iphone-glass border border-white/10 rounded-xl px-4 py-2 text-sm bg-white/5 text-white">
                        <option value="">All Files</option>
                        <option value="image">Images</option>
                        <option value="video">Videos</option>
                        <option value="document">Documents</option>
                    </select>
                    <select id="sort-by" onchange="filterMedia()"
                        class="iphone-glass border border-white/10 rounded-xl px-4 py-2 text-sm bg-white/5 text-white">
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                        <option value="size">Size</option>
                        <option value="name">Name (A-Z)</option>
                    </select>
                </div>

                <!-- Media Grid -->
                <div id="media-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                    <!-- Media items loaded via JS -->
                    <div class="col-span-full text-center py-12 text-gray-400">
                        <i data-lucide="image" class="w-12 h-12 mx-auto mb-4 opacity-50"></i>
                        <p>No media files yet. Start uploading!</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Upload Modal -->
    <div id="upload-modal"
        class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div class="iphone-glass rounded-[2rem] p-8 w-full max-w-lg border border-white/10 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-xl font-black text-white tracking-tight">Upload Media</h3>
                <button onclick="closeUploadModal()"
                    class="w-10 h-10 iphone-glass rounded-xl flex items-center justify-center text-gray-400 hover:text-white transition-all">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>

            <form id="upload-form" class="space-y-6">
                <!-- Drag & Drop Area -->
                <div id="drop-zone"
                    class="border-2 border-dashed border-white/20 rounded-2xl p-12 text-center hover:border-white/40 transition-all cursor-pointer">
                    <i data-lucide="cloud-upload" class="w-12 h-12 mx-auto mb-4 text-gray-400"></i>
                    <p class="text-white font-semibold mb-2">Drag files here or click to browse</p>
                    <p class="text-gray-400 text-sm">Max file size: 50MB | Supported: JPG, PNG, GIF, PDF, MP4</p>
                </div>

                <!-- File Input -->
                <input type="file" id="file-input" multiple accept="image/*,.pdf,video/*" class="hidden">

                <!-- File List -->
                <div id="file-list" class="space-y-2 max-h-48 overflow-y-auto">
                    <!-- Selected files shown here -->
                </div>

                <!-- Alt Text (for images) -->
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Alternative Text (Optional)</label>
                    <input type="text" id="alt-text" placeholder="Describe the media for accessibility"
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:bg-white/10 transition-all outline-none">
                </div>

                <!-- Category -->
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Category</label>
                    <select id="media-category"
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:bg-white/10 transition-all outline-none appearance-none">
                        <option value="product">Product</option>
                        <option value="marketing">Marketing</option>
                        <option value="content">Content</option>
                        <option value="profile">Profile</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <!-- Upload Button -->
                <button type="submit"
                    class="w-full bg-white text-black font-bold py-3 rounded-xl hover:bg-gray-200 transition-all mt-4">
                    Upload Files
                </button>
            </form>
        </div>
    </div>

    <!-- Preview Modal -->
    <div id="preview-modal"
        class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div class="relative max-w-2xl w-full">
            <button onclick="closePreviewModal()"
                class="absolute top-4 right-4 w-10 h-10 bg-black/50 rounded-full flex items-center justify-center text-white hover:bg-black/70 transition-all z-10">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
            <div id="preview-content" class="bg-black rounded-2xl overflow-hidden">
                <!-- Preview content loaded via JS -->
            </div>
            <div class="mt-4 flex gap-2">
                <button onclick="deleteMedia()" class="flex-1 bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700">
                    Delete
                </button>
                <button onclick="copyMediaURL()" class="flex-1 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
                    Copy URL
                </button>
                <button onclick="downloadMedia()" class="flex-1 bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">
                    Download
                </button>
            </div>
        </div>
    </div>
</body>

</html>
