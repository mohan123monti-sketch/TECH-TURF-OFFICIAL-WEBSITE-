<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Tech Turf</title>

    <!-- External Libraries -->
    <link rel="stylesheet" href="/src/css/tailwind.generated.css">
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Styles & Scripts -->
    <link rel="stylesheet" href="/src/css/brutalist.css">
    <script src="/src/js/core/layout.js" defer></script>
</head>

<body data-page="contact.html">

    <!-- Header Container -->
    <div id="header-container"></div>

    <main class="split-screen">
        <!-- Background Watermark -->
        <div class="watermark">CONTACT</div>

        <!-- LEFT SIDE: Information Zone -->
        <section class="info-zone">
            <!-- Top Metadata -->
            <div class="metadata">
                CHANNEL: SECURE<br>
                AVAILABILITY: 24/7 ENCRYPTED
            </div>

            <!-- Center Content -->
            <div class="center-content">
                <h1 class="welcome-headline">RELAY</h1>
                <p class="subheading">Establish a high-fidelity communication link with our specialized divisions. We respond to technical inquiry with extreme precision.</p>
                <div class="mt-8 space-y-2 text-sm font-bold uppercase tracking-widest">
                    <p>PH: +1 XXX XXX XXXX</p>
                    <p>EM: RELAY@TECHTURF.COM</p>
                </div>
            </div>

            <!-- Bottom Navigation -->
            <div class="bottom-nav">
                TRANSMISSION / 02
            </div>
        </section>

        <!-- RIGHT SIDE: Visual Focal Zone -->
        <section class="focal-zone">
            <img src="/assets/logos/tech-turf.png" alt="Tech Turf" class="logo-hero">
        </section>
    </main>

    <section class="page-content">
        <h2 class="section-title">Direct Link</h2>
        <div class="max-w-4xl">
            <form id="contact-form" class="space-y-12">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                    <input type="text" placeholder="GIVEN NAME" class="w-full bg-transparent border-b-2 border-black/10 py-4 outline-none focus:border-black font-bold uppercase text-sm tracking-widest transition-all">
                    <input type="text" placeholder="FAMILY NAME" class="w-full bg-transparent border-b-2 border-black/10 py-4 outline-none focus:border-black font-bold uppercase text-sm tracking-widest transition-all">
                </div>
                <input type="email" placeholder="ELECTRONIC MAIL" class="w-full bg-transparent border-b-2 border-black/10 py-4 outline-none focus:border-black font-bold uppercase text-sm tracking-widest transition-all">
                <textarea rows="4" placeholder="TRANSMISSION DATA" class="w-full bg-transparent border-b-2 border-black/10 py-4 outline-none focus:border-black font-bold uppercase text-sm tracking-widest transition-all resize-none"></textarea>
                <button type="submit" class="brutalist-btn">INITIATE TRANSMISSION</button>
            </form>
        </div>
    </section>

    <div id="notification-container" class="fixed top-24 right-6 z-[100] flex flex-col gap-4 pointer-events-none"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) lucide.createIcons();
        });
    </script>
</body>

</html>
