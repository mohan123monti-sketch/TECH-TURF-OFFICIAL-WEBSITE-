<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Tech Turf</title>
    <link rel="stylesheet" href="/src/css/tailwind.generated.css">
    <link rel="stylesheet" href="/src/css/pages/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/src/js/core/layout.js" defer></script>
</head>

<body data-page="login.html" class="text-white" data-3d-enabled="true">
    <div id="three-container"></div>
    <div id="header-container"></div>

    <main class="relative z-10 pt-36 pb-20 px-4">
        <div class="max-w-xl mx-auto">
            <div class="iphone-glass tt-fluid-panel border border-white/10 shadow-3xl">
                <h1 class="tt-page-hero-title text-5xl font-black uppercase tracking-tighter leading-none mb-4">Reset<br><span class="text-white/30">Request</span></h1>
                <p class="text-white/60 mb-10">Enter your account email. We will send an OTP for password reset.</p>

                <form id="forgot-form" class="space-y-5">
                    <div>
                        <label for="email" class="block text-xs uppercase tracking-wider text-white/50 mb-2">Email Address</label>
                        <input id="email" type="email" required placeholder="you@example.com"
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:bg-white/10">
                    </div>
                    <button type="submit" id="submit-btn"
                        class="w-full magnetic-btn bg-white text-black py-3 rounded-xl font-black uppercase tracking-wider hover:bg-gray-200 transition-all">
                        Send OTP
                    </button>
                </form>

                <div class="mt-8 text-sm text-white/60">
                    <a href="login.html" class="text-orange-400 hover:text-orange-300 transition-link">Back to login</a>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('forgot-form');
            const btn = document.getElementById('submit-btn');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value.trim();
                if (!email) return;

                const oldText = btn.textContent;
                btn.disabled = true;
                btn.textContent = 'Sending...';

                try {
                    const res = await fetch(`${window.API_BASE_URL}/auth/forgot-password`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });
                    const data = await res.json();

                    if (!res.ok) throw new Error(data.message || 'Failed to send OTP');

                    window.showMessage('success', data.message || 'OTP sent to your email.');
                    setTimeout(() => {
                        window.location.href = `reset-password.html?email=${encodeURIComponent(email)}`;
                    }, 700);
                } catch (err) {
                    window.showMessage('error', err.message || 'Unable to process request');
                } finally {
                    btn.disabled = false;
                    btn.textContent = oldText;
                }
            });
        });
    </script>
</body>

</html>
