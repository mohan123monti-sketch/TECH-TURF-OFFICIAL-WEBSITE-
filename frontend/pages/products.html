<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Turf - Products & Services</title>

    <!-- External Libraries -->
    <link rel="stylesheet" href="/src/css/tailwind.generated.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Our New Centralized Files -->
    <link rel="stylesheet" href="/src/css/pages/style.css">
    <script src="/src/js/core/layout.js" defer></script>
    <script src="/src/js/pages/products-dynamic.js" type="module" defer></script>
</head>

<body data-page="products.html" data-3d-enabled="true" class="text-white">

    <!-- This div is the target for the Three.js canvas -->
    <div id="three-container"></div>

    <!-- This div will be filled by layout.js -->
    <div id="header-container"></div>

    <!-- Main Page Content -->
    <main class="relative z-10 py-24 sm:py-32 px-4">
        <div class="max-w-7xl mx-auto">

            <!-- Title -->
            <div class="text-center mb-40 reveal-hidden">
                <h1 class="tt-page-hero-title text-6xl md:text-9xl font-black mb-6 tracking-tighter text-white uppercase leading-none">
                    The<br><span class="text-white">Ecosystem</span>
                </h1>
                <p class="text-[10px] font-black text-white/50 uppercase tracking-[0.5em] mt-8 opacity-50 reveal-hidden"
                    style="transition-delay: 0.2s;">
                    Autonomous Network Protocol v4.0
                </p>
                <p id="subtitle"
                    class="text-xl md:text-2xl text-white/60 max-w-2xl mx-auto mt-12 font-medium leading-relaxed reveal-hidden"
                    style="transition-delay: 0.4s;">
                    Explore high-fidelity digital and physical solutions from across the Tech Turf network.
                </p>
            </div>

            <!-- Product Categories -->
            <section class="mb-40">
                <div class="grid md:grid-cols-3 gap-10"></div>
            </section>

            <!-- CTA Section -->
            <section class="py-20 reveal-hidden">
                <div
                    class="relative max-w-6xl mx-auto p-20 md:p-32 rounded-[4rem] overflow-hidden iphone-glass border border-white/5 shadow-3xl text-center">
                    <div class="spotlight-overlay"></div>
                    <!-- Background Glow -->


                    <div class="relative z-10">
                        <h2
                            class="text-6xl md:text-8xl font-black mb-10 tracking-tighter text-white uppercase leading-none">
                            Need a<br><span class="text-white/30">Custom</span> Solution?</h2>
                        <p class="text-[10px] font-black text-white/50 uppercase tracking-[0.5em] mb-16 opacity-50">
                            Initialize specialized project sequence</p>

                        <div class="flex flex-col sm:flex-row justify-center gap-10">
                            <a href="contact.html"
                                class="magnetic-btn transition-link px-16 py-6 bg-white text-black font-black uppercase tracking-widest text-xs rounded-2xl hover:bg-gray-200 transition-all shadow-2xl shadow-white/10">
                                Start Your Project
                            </a>
                            <a href="contact.html"
                                class="magnetic-btn transition-link iphone-glass px-16 py-6 text-white font-black uppercase tracking-widest text-xs rounded-2xl hover:bg-white/5 transition-all border border-white/10">
                                speak to sales
                            </a>
                        </div>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <!-- This div will be filled by layout.js -->
    <div id="footer-container"></div>

    <script>
        // Initialize Lucide icons on load for this page
        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) lucide.createIcons();
        });
    </script>
</body>

</html>
