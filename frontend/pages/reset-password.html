<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Tech Turf</title>
    <link rel="stylesheet" href="/src/css/tailwind.generated.css">
    <link rel="stylesheet" href="/src/css/pages/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/src/js/core/layout.js" defer></script>
</head>

<body data-page="login.html" class="text-white" data-3d-enabled="true">
    <div id="three-container"></div>
    <div id="header-container"></div>

    <main class="relative z-10 pt-36 pb-20 px-4">
        <div class="max-w-xl mx-auto">
            <div class="iphone-glass tt-fluid-panel border border-white/10 shadow-3xl">
                <h1 class="tt-page-hero-title text-5xl font-black uppercase tracking-tighter leading-none mb-4">Set New<br><span class="text-white/30">Password</span></h1>
                <p class="text-white/60 mb-10">Enter the OTP sent to your email and choose a new password.</p>

                <form id="reset-form" class="space-y-5">
                    <div>
                        <label for="email" class="block text-xs uppercase tracking-wider text-white/50 mb-2">Email</label>
                        <input id="email" type="email" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:bg-white/10">
                    </div>
                    <div>
                        <label for="otp" class="block text-xs uppercase tracking-wider text-white/50 mb-2">OTP</label>
                        <input id="otp" type="text" required maxlength="6" placeholder="6-digit code"
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:bg-white/10">
                    </div>
                    <div>
                        <label for="newPassword" class="block text-xs uppercase tracking-wider text-white/50 mb-2">New Password</label>
                        <input id="newPassword" type="password" required minlength="8"
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:bg-white/10">
                    </div>
                    <div>
                        <label for="confirmPassword" class="block text-xs uppercase tracking-wider text-white/50 mb-2">Confirm Password</label>
                        <input id="confirmPassword" type="password" required minlength="8"
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:bg-white/10">
                    </div>
                    <button type="submit" id="submit-btn"
                        class="w-full magnetic-btn bg-white text-black py-3 rounded-xl font-black uppercase tracking-wider hover:bg-gray-200 transition-all">
                        Reset Password
                    </button>
                </form>

                <div class="mt-8 text-sm text-white/60">
                    <a href="login.html" class="text-orange-400 hover:text-orange-300 transition-link">Back to login</a>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const emailInput = document.getElementById('email');
            const queryEmail = new URLSearchParams(window.location.search).get('email');
            if (queryEmail) emailInput.value = queryEmail;

            const form = document.getElementById('reset-form');
            const btn = document.getElementById('submit-btn');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const email = emailInput.value.trim();
                const otp = document.getElementById('otp').value.trim();
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                if (newPassword !== confirmPassword) {
                    window.showMessage('error', 'Passwords do not match');
                    return;
                }

                const oldText = btn.textContent;
                btn.disabled = true;
                btn.textContent = 'Resetting...';

                try {
                    const res = await fetch(`${window.API_BASE_URL}/auth/reset-password`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, otp, newPassword })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.message || 'Unable to reset password');

                    window.showMessage('success', data.message || 'Password reset successful');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 900);
                } catch (err) {
                    window.showMessage('error', err.message || 'Reset failed');
                } finally {
                    btn.disabled = false;
                    btn.textContent = oldText;
                }
            });
        });
    </script>
</body>

</html>
