<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Turf - Futuristic Technology Marketplace</title>

    <link rel="stylesheet" href="/src/css/tailwind.generated.css">
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="/src/css/pages/style.css">
    <link rel="stylesheet" href="/src/css/pages/shop-styles.css">
    <style>
        /* --- Advanced Features Dropdown Styles --- */
        .features-dropdown-menu {
            position: absolute;
            top: calc(100% + 12px);
            left: 0;
            width: 340px;
            max-height: 480px;
            background: rgba(11, 21, 55, 0.95);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            z-index: 150;
            overflow-y: auto;
            padding: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .features-dropdown-menu.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .features-category-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-bottom: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .features-category-header {
            padding: 12px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.3s;
        }

        .features-category-header:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .features-category-title {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #ffffff;
        }

        .features-category-content {
            padding: 0 14px 14px;
            display: none;
            animation: tt-fade-in 0.3s ease;
        }

        .features-category-content.active {
            display: block;
        }

        .features-subcategory {
            margin-top: 14px;
        }

        .features-subcategory-title {
            font-size: 9px;
            font-weight: 800;
            color: #64748b;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 4px;
        }

        .features-options-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 4px;
        }

        .features-option-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }

        .features-option-item:hover {
            background: rgba(210, 103, 14, 0.1);
            color: white;
        }

        .features-option-item input {
            accent-color: #d2670e;
            width: 14px;
            height: 14px;
            cursor: pointer;
        }

        .features-search-box {
            position: sticky;
            top: 0;
            z-index: 20;
            background: rgba(11, 21, 55, 0.98);
            margin: -16px -16px 16px;
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .features-search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 12px;
            color: white;
            outline: none;
            transition: all 0.3s;
        }

        .features-search-input:focus {
            border-color: rgba(210, 103, 14, 0.4);
            background: rgba(255, 255, 255, 0.08);
        }

        .features-chips-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .feature-tag {
            background: rgba(210, 103, 14, 0.15);
            border: 1px solid rgba(210, 103, 14, 0.3);
            color: #fb923c;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            animation: tt-scale-in 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            transition: all 0.3s;
        }

        .feature-tag:hover {
            background: rgba(210, 103, 14, 0.25);
            transform: translateY(-1px);
        }

        @keyframes tt-fade-in {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes tt-scale-in {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .features-dropdown-trigger {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .features-dropdown-trigger:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .features-dropdown-trigger i {
            transition: transform 0.3s;
        }

        .features-dropdown-trigger.active i {
            transform: rotate(180deg);
        }

        .features-select-all {
            font-size: 9px;
            color: #d2670e;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .features-select-all:hover {
            opacity: 1;
        }

        /* Responsive Dropdown */
        @media (max-width: 768px) {
            .features-dropdown-menu {
                width: calc(100vw - 36px);
                max-height: 400px;
            }
        }
    </style>
    <script src="/src/js/features/shop-logic.js"></script>
    <script src="/src/js/core/layout.js" defer></script>
</head>


<body data-page="Shop" class="shop-branding">
    <div id="header-container"></div>

    <section class="product-section">
        <div class="shop-container">

            <div class="filters-shell mb-8">
                <div class="mb-8 grid grid-cols-1 lg:grid-cols-4 gap-4">
                <div class="lg:col-span-2">
                    <label class="block text-xs text-gray-400 uppercase tracking-widest mb-2">Search</label>
                    <input id="search-input" type="text" placeholder="Search products"
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:bg-white/10 transition-all outline-none">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 uppercase tracking-widest mb-2">Sort</label>
                    <select id="sort-select"
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:bg-white/10 transition-all outline-none">
                        <option value="featured">Featured</option>
                        <option value="price-asc">Price: Low to High</option>
                        <option value="price-desc">Price: High to Low</option>
                        <option value="newest">Newest</option>
                        <option value="name-asc">Name: A to Z</option>
                    </select>
                </div>
                <div class="relative">
                    <label class="block text-xs text-gray-400 uppercase tracking-widest mb-2">Features</label>
                    <div id="features-dropdown" class="features-dropdown-trigger">
                        <span id="features-label">Select Features</span>
                        <i data-lucide="chevron-down" class="w-4 h-4"></i>
                    </div>
                    <div id="features-menu" class="features-dropdown-menu">
                        <div class="features-search-box">
                            <input type="text" id="features-search" placeholder="Search features..." class="features-search-input">
                        </div>
                        <div id="features-list">
                            <!-- Categories will be injected here -->
                        </div>
                        <div class="mt-6 pt-4 border-t border-white/10">
                            <button id="clear-features-btn" class="px-4 py-2 bg-red-500/10 text-red-400 border border-red-500/20 rounded-lg text-xs font-bold uppercase tracking-widest hover:bg-red-500/20 transition-all">
                                Clear Features
                            </button>
                        </div>
                    </div>
                </div>
                </div>

                <div class="mb-6 grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-xs text-gray-400 uppercase tracking-widest mb-2">Price Range</label>
                    <div class="flex gap-2">
                        <input id="price-min" type="number" min="0" placeholder="Min"
                            class="w-1/2 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:bg-white/10 transition-all outline-none">
                        <input id="price-max" type="number" min="0" placeholder="Max"
                            class="w-1/2 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:bg-white/10 transition-all outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 uppercase tracking-widest mb-2">Brand</label>
                    <select id="brand-select"
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:bg-white/10 transition-all outline-none">
                        <option value="all">All Brands</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 uppercase tracking-widest mb-2">Min Rating</label>
                    <select id="rating-min"
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:bg-white/10 transition-all outline-none">
                        <option value="0">All Ratings</option>
                        <option value="4">4+ Stars</option>
                        <option value="3">3+ Stars</option>
                        <option value="2">2+ Stars</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 uppercase tracking-widest mb-2">Delivery (Days)</label>
                    <select id="delivery-max"
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:bg-white/10 transition-all outline-none">
                        <option value="0">Any</option>
                        <option value="1">1 Day</option>
                        <option value="2">2 Days</option>
                        <option value="3">3 Days</option>
                        <option value="5">5 Days</option>
                    </select>
                </div>
                </div>


                <div class="mb-4 flex flex-wrap items-center gap-6">
                    <label class="inline-flex items-center gap-2 text-xs text-gray-400 uppercase tracking-widest cursor-pointer group">
                        <input id="in-stock-only" type="checkbox" class="accent-orange-500 w-4 h-4 rounded border-white/10 bg-white/5">
                        <span class="group-hover:text-white transition-colors">In stock only</span>
                    </label>
                    <label class="inline-flex items-center gap-2 text-xs text-gray-400 uppercase tracking-widest cursor-pointer group">
                        <input id="wishlist-only" type="checkbox" class="accent-orange-500 w-4 h-4 rounded border-white/10 bg-white/5">
                        <span class="group-hover:text-white transition-colors">Wishlist only</span>
                    </label>
                </div>

                <div id="selected-features-chips" class="features-chips-container mb-6"></div>


                <div class="mb-2 flex flex-wrap items-center gap-4 justify-between">
                    <div class="flex flex-wrap items-center gap-4">
                <label class="inline-flex items-center gap-2 text-xs text-gray-400 uppercase tracking-widest">
                    <input id="wishlist-only" type="checkbox" class="accent-orange-500">
                    Wishlist only
                </label>
                <button id="clear-filters"
                    class="px-4 py-2 bg-white/5 border border-white/10 rounded-xl text-xs text-white/70 uppercase tracking-widest hover:bg-white/10 transition-all">
                    Clear Filters
                </button>
                    </div>
                    <span class="text-xs text-white/40 uppercase tracking-widest">Live Product Feed</span>
                </div>
            </div>

            <div id="products-grid" class="product-grid"></div>
            <div id="pagination" class="mt-10 flex items-center justify-between text-xs text-white/60 uppercase tracking-widest"></div>

            <section id="recent-section" class="mt-16 hidden">
                <div class="section-head mb-8">
                    <div>
                        <span class="text-orange-500 font-mono tracking-widest text-xs uppercase mb-2 block">Quick Access</span>
                        <h3 class="text-2xl md:text-3xl font-black text-white uppercase tracking-tighter">Recently Viewed</h3>
                    </div>
                </div>
                <div id="recent-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </section>
        </div>
    </section>

    <div id="compare-bar" class="hidden fixed bottom-24 right-6 z-[120] bg-black/70 border border-white/15 rounded-2xl px-4 py-3 backdrop-blur-xl flex items-center gap-3">
        <span id="compare-count" class="text-xs text-white/80 uppercase tracking-widest">Compare (0)</span>
        <button id="compare-go" class="px-3 py-2 rounded-lg bg-orange-600 text-white text-xs font-semibold uppercase tracking-wide disabled:opacity-40">Open Compare</button>
    </div>

    <div id="footer-container"></div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const productsGrid = document.getElementById('products-grid');
            const productCount = document.getElementById('product-count');
            const searchInput = document.getElementById('search-input');
            const sortSelect = document.getElementById('sort-select');
            const priceMinInput = document.getElementById('price-min');
            const priceMaxInput = document.getElementById('price-max');
            const brandSelect = document.getElementById('brand-select');
            const ratingMinSelect = document.getElementById('rating-min');
            const deliveryMaxSelect = document.getElementById('delivery-max');
            const inStockOnlyInput = document.getElementById('in-stock-only');
            const wishlistOnlyInput = document.getElementById('wishlist-only');
            const clearFiltersBtn = document.getElementById('clear-filters');
            const pagination = document.getElementById('pagination');
            const compareBar = document.getElementById('compare-bar');
            const compareCount = document.getElementById('compare-count');
            const compareGo = document.getElementById('compare-go');
            const recentSection = document.getElementById('recent-section');
            const recentGrid = document.getElementById('recent-grid');
            let recentProductsCache = [];
            let recentProductsLoaded = false;
            let recentProductsLoading = null;

            if (productCount) productCount.textContent = 'Loading Inventory...';

            const allProducts = await window.fetchProducts();

            if (productCount) productCount.textContent = `${allProducts.length} Units Available`;
            if (allProducts.length === 0) {
                productsGrid.innerHTML = '<p class="text-white text-center col-span-full">No products found.</p>';
                return;
            }

            const state = {
                products: allProducts,
                filtered: allProducts,
                currentPage: 1,
                itemsPerPage: 12,
                search: '',
                sort: 'featured',
                priceMin: null,
                priceMax: null,
                category: 'all',
                brand: 'all',
                ratingMin: 0,
                deliveryMax: 0,
                inStockOnly: false,
                wishlistOnly: false,
                selectedFeatures: new Set(),
                wishlist: new Set((window.getWishlistIds ? window.getWishlistIds() : []).map(String)),
                compare: new Set((window.getCompareIds ? window.getCompareIds() : []).map(String)),
            };

            const featureData = {
                "Technical Parameters": {
                    "Frontend Framework": ["React.js", "Next.js", "Angular", "HTML/CSS/JS", "Tailwind CSS"],
                    "Backend Framework": ["Node.js", "Express.js", "Django", "Flask", "Spring Boot", "ASP.NET"],
                    "Programming Language": ["JavaScript", "TypeScript", "Python", "C++", "Java", "C#", "Go"],
                    "Database": ["MongoDB", "MySQL", "PostgreSQL", "Firebase", "SQLite", "Supabase", "MariaDB"],
                    "AI Features": ["Chatbot", "AI Search", "Recommendation Engine", "Content Generator", "Voice Assistant", "OCR Scanner", "Automation Bot"],
                    "Authentication": ["Email Login", "Google Login", "OTP Login", "Facebook Login", "Role Based Login", "Admin Login", "Two-Factor Auth"],
                    "Hosting": ["Vercel", "Netlify", "AWS", "DigitalOcean", "Hostinger", "Shared Hosting", "VPS Hosting"]
                },
                "Non-Technical Parameters": {
                    "Theme Style": ["Minimal", "Corporate", "Luxury", "Dark Mode", "Modern Startup", "Creative", "Elegant"],
                    "Color Preference": ["Blue", "Black", "White", "Gradient", "Green", "Purple", "Custom Brand Color"],
                    "Fonts": ["Poppins", "Inter", "Roboto", "Montserrat", "Open Sans", "Lato", "Playfair Display"],
                    "Animation Type": ["Fade In", "Hover Effects", "Scroll Reveal", "Parallax", "Smooth Transition", "Zoom Effect", "3D Motion"],
                    "Layout Style": ["Grid Layout", "Full Width", "Boxed Layout", "Split Screen", "One Page Scroll", "Masonry Layout", "Card Based"],
                    "Navigation Style": ["Top Navbar", "Sidebar", "Hamburger Menu", "Sticky Navbar", "Mega Menu", "Floating Menu", "Bottom Navigation"],
                    "Image Style": ["Real Photos", "Illustrations", "3D Graphics", "Icons Only", "Video Background", "Abstract Art", "Minimal Visuals"]
                },
                "Business Parameters": {
                    "Website Type": ["Business Website", "Portfolio Website", "E-commerce Store", "SaaS Website", "Blog Website", "Landing Page", "Booking Website"],
                    "Industry Type": ["Healthcare", "Education", "Finance", "Restaurant", "Real Estate", "Travel", "Startup"],
                    "Goal": ["Lead Generation", "Online Sales", "Branding", "Booking System", "Community Building", "Product Showcase", "Information Portal"]
                },
                "Features Required": {
                    "Top Features": [
                    "Admin Panel", "Payment Gateway", "SEO Setup", "Mobile Responsive",
                    "User Login / Signup", "Contact Form", "Live Chat",
                    "Analytics Dashboard", "Blog Module", "Search Bar",
                    "Booking System", "Customer Reviews & Ratings",
                    "WhatsApp Integration", "Multi-language Support",
                    "Security (SSL + Authentication)", "API Integration"
                    ]
                }
            };

            const featuresDropdown = document.getElementById('features-dropdown');
            const featuresMenu = document.getElementById('features-menu');
            const featuresList = document.getElementById('features-list');
            const featuresSearch = document.getElementById('features-search');
            const selectedFeaturesChips = document.getElementById('selected-features-chips');
            const featuresLabel = document.getElementById('features-label');
            const clearFeaturesBtn = document.getElementById('clear-features-btn');

            const initFeaturesDropdown = () => {
                featuresList.innerHTML = Object.entries(featureData).map(([section, categories]) => `
                    <div class="mb-6">
                        <h2 class="text-sm font-black mb-3 text-orange-500 uppercase tracking-tighter">
                            ${section}
                        </h2>
                        ${Object.entries(categories).map(([category, items]) => `
                            <div class="mb-4">
                                <p class="text-[10px] font-bold text-white/40 mb-2 uppercase tracking-widest">${category}</p>
                                <div class="flex flex-wrap gap-2">
                                    ${items.map(item => `
                                        <label class="flex items-center gap-2 text-[11px] bg-white/5 border border-white/5 px-3 py-1.5 rounded-lg cursor-pointer hover:bg-white/10 hover:border-white/10 transition-all">
                                            <input type="checkbox" value="${item}" class="feature-checkbox accent-orange-500 w-3 h-3">
                                            <span class="text-white/80">${item}</span>
                                        </label>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `).join('');

                if (window.lucide) lucide.createIcons();

                // Checkbox change
                featuresList.addEventListener('change', (e) => {
                    if (e.target.classList.contains('feature-checkbox')) {
                        handleFeatureToggle(e.target.value, e.target.checked);
                        renderFeatureChips();
                        handleFilterChange();
                    }
                });

                // Search logic
                featuresSearch.addEventListener('input', () => {
                    const term = featuresSearch.value.toLowerCase();
                    featuresList.querySelectorAll('label').forEach(item => {
                        const text = item.textContent.toLowerCase();
                        item.style.display = text.includes(term) ? 'flex' : 'none';
                    });
                });
                
                clearFeaturesBtn.addEventListener('click', () => {
                    state.selectedFeatures.clear();
                    featuresList.querySelectorAll('.feature-checkbox').forEach(cb => cb.checked = false);
                    renderFeatureChips();
                    handleFilterChange();
                });
            };

            const handleFeatureToggle = (feature, isChecked) => {
                if (isChecked) state.selectedFeatures.add(feature);
                else state.selectedFeatures.delete(feature);
                
                // Keep checkboxes in sync
                featuresList.querySelectorAll(`.feature-checkbox[value="${feature}"]`).forEach(cb => cb.checked = isChecked);
            };

            const renderFeatureChips = () => {
                const count = state.selectedFeatures.size;
                featuresLabel.textContent = count > 0 ? `${count} Features Selected` : 'Select Features';
                
                selectedFeaturesChips.innerHTML = Array.from(state.selectedFeatures).map(feat => `
                    <div class="feature-tag" data-feature="${feat}">
                        ${feat} <i data-lucide="x" class="w-3 h-3"></i>
                    </div>
                `).join('');
                
                if (window.lucide) lucide.createIcons();

                selectedFeaturesChips.querySelectorAll('.feature-tag').forEach(tag => {
                    tag.addEventListener('click', () => {
                        const feat = tag.dataset.feature;
                        handleFeatureToggle(feat, false);
                        renderFeatureChips();
                        handleFilterChange();
                    });
                });
            };

            // Dropdown Toggle
            featuresDropdown.addEventListener('click', (e) => {
                e.stopPropagation();
                featuresDropdown.classList.toggle('active');
                featuresMenu.classList.toggle('active');
            });

            document.addEventListener('click', (e) => {
                if (!featuresDropdown.contains(e.target) && !featuresMenu.contains(e.target)) {
                    featuresDropdown.classList.remove('active');
                    featuresMenu.classList.remove('active');
                }
            });

            initFeaturesDropdown();


            const productMap = new Map();
            allProducts.forEach((product) => {
                const productId = product._id || product.id;
                if (productId) productMap.set(String(productId), product);
            });

            const getStock = (product) => Number(product.stock || product.countInStock || 0);

            const renderStars = (rating) => {
                const rounded = Math.round(Number(rating || 0));
                const stars = [];
                for (let i = 1; i <= 5; i += 1) {
                    stars.push(`<span class="${i <= rounded ? 'text-yellow-400' : 'text-white/20'}">★</span>`);
                }
                return stars.join('');
            };

            const renderProduct = (product) => {
                const stockCount = getStock(product);
                const productId = product._id || product.id;
                const isWishlisted = productId ? state.wishlist.has(String(productId)) : false;
                const isCompared = productId ? state.compare.has(String(productId)) : false;
                const wishlistClass = isWishlisted ? 'text-red-400 border-red-400/40' : 'text-white/50 border-white/10';
                const compareClass = isCompared ? 'text-blue-400 border-blue-400/40' : 'text-white/50 border-white/10';
                const imageUrl = window.normalizeProductImageUrl
                    ? window.normalizeProductImageUrl(product.imageUrl || (product.images && product.images[0]) || product.image_url || product.image)
                    : (product.imageUrl || (product.images && product.images[0]) || product.image_url || product.image || '/public/images/space-bg.png');

                return `
                <div class="product-card group relative bg-white/5 border border-white/10 rounded-2xl overflow-hidden hover:border-[#d2670e]/50 transition-all duration-300" data-category="${product.branch || product.category || 'Tech Turf'}" data-product-id="${productId || ''}">
                    <div class="absolute top-3 right-3 flex gap-2">
                        <button class="compare-btn w-10 h-10 rounded-full border ${compareClass} bg-black/40 backdrop-blur flex items-center justify-center transition-all" data-product-id="${productId || ''}" aria-label="Toggle compare">
                            <i data-lucide="columns" class="w-4 h-4"></i>
                        </button>
                        <button class="wishlist-btn w-10 h-10 rounded-full border ${wishlistClass} bg-black/40 backdrop-blur flex items-center justify-center transition-all" data-product-id="${productId || ''}" aria-label="Toggle wishlist">
                            <i data-lucide="heart" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <div class="aspect-square bg-black/20 relative overflow-hidden">
                        <img src="${imageUrl}" alt="${product.name}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end justify-center p-6">
                            <button
                                ${stockCount > 0 ? '' : 'disabled'}
                                class="add-to-cart-btn ${stockCount > 0 ? 'bg-[#d2670e] hover:bg-[#b0550b] cursor-pointer' : 'bg-white/10 text-white/40 cursor-not-allowed'} text-white px-6 py-3 rounded-full font-bold uppercase text-xs tracking-widest transition-colors w-full"
                                data-product-id="${productId || ''}">
                                ${stockCount > 0 ? 'Add to Cart' : 'Out of Stock'}
                            </button>
                        </div>
                    </div>
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="text-white font-bold text-lg leading-tight group-hover:text-[#d2670e] transition-colors">${product.name}</h3>
                            <span class="text-[#d2670e] font-mono font-bold">₹${product.price}</span>
                        </div>
                        <p class="text-gray-400 text-sm line-clamp-2 mb-4">${product.description}</p>
                        <div class="flex items-center gap-2 text-xs text-gray-500 font-mono mb-2">
                            <span class="w-2 h-2 rounded-full ${stockCount > 0 ? 'bg-green-500' : 'bg-red-500'}"></span>
                            ${stockCount > 0 ? `In Stock (${stockCount})` : 'Out of Stock'}
                        </div>
                        <div class="flex items-center justify-between text-xs text-white/50 uppercase tracking-widest mb-3">
                            <span>ETA ${Number(product.deliveryEtaDays || 3)}d</span>
                            <span>${product.brand || 'Tech Turf'}</span>
                        </div>
                        <div class="flex items-center justify-between text-xs mb-4">
                            <span class="text-yellow-400">${renderStars(product.ratingAvg || 0)}</span>
                            <span class="text-white/40">${Number(product.ratingCount || 0)} reviews</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <input type="number" min="1" value="1" ${stockCount > 0 ? '' : 'disabled'}
                                class="qty-input w-20 bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-white text-xs focus:bg-white/10 outline-none"
                                data-product-id="${productId || ''}">
                            <button class="quick-add-btn flex-1 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest ${stockCount > 0 ? 'bg-white/10 hover:bg-white/20 text-white' : 'bg-white/5 text-white/30 cursor-not-allowed'}"
                                ${stockCount > 0 ? '' : 'disabled'} data-product-id="${productId || ''}">
                                Quick Add
                            </button>
                        </div>
                    </div>
                </div>
                `;
            };

            const renderPagination = () => {
                const totalPages = Math.max(1, Math.ceil(state.filtered.length / state.itemsPerPage));
                if (state.currentPage > totalPages) state.currentPage = totalPages;

                const pageLabel = `Page ${state.currentPage} of ${totalPages}`;
                const canPrev = state.currentPage > 1;
                const canNext = state.currentPage < totalPages;

                pagination.innerHTML = `
                    <button id="page-prev" class="px-4 py-2 rounded-xl border border-white/10 ${canPrev ? 'text-white hover:bg-white/10' : 'text-white/30 cursor-not-allowed'}" ${canPrev ? '' : 'disabled'}>
                        Previous
                    </button>
                    <span>${pageLabel}</span>
                    <button id="page-next" class="px-4 py-2 rounded-xl border border-white/10 ${canNext ? 'text-white hover:bg-white/10' : 'text-white/30 cursor-not-allowed'}" ${canNext ? '' : 'disabled'}>
                        Next
                    </button>
                `;

                const prevBtn = document.getElementById('page-prev');
                const nextBtn = document.getElementById('page-next');
                if (prevBtn) prevBtn.addEventListener('click', () => { state.currentPage -= 1; render(); });
                if (nextBtn) nextBtn.addEventListener('click', () => { state.currentPage += 1; render(); });
            };

            const updateCompareBar = () => {
                const count = state.compare.size;
                if (count === 0) {
                    compareBar.classList.add('hidden');
                } else {
                    compareBar.classList.remove('hidden');
                }
                compareCount.textContent = `Compare (${count})`;
                compareGo.disabled = count < 2;
                compareGo.classList.toggle('cursor-not-allowed', count < 2);
            };

            const applyFilters = () => {
                const search = state.search.trim().toLowerCase();

                state.filtered = state.products.filter((product) => {
                    const name = (product.name || '').toLowerCase();
                    const desc = (product.description || '').toLowerCase();
                    const matchesSearch = !search || name.includes(search) || desc.includes(search);

                    const category = product.branch || product.category || 'Tech Turf';
                    const matchesCategory = state.category === 'all' || category === state.category;

                    const price = Number(product.price || 0);
                    const minOk = state.priceMin === null || price >= state.priceMin;
                    const maxOk = state.priceMax === null || price <= state.priceMax;

                    const productId = product._id || product.id;
                    const matchesWishlist = !state.wishlistOnly || (productId && state.wishlist.has(String(productId)));

                    const brand = product.brand || 'Tech Turf';
                    const matchesBrand = state.brand === 'all' || brand === state.brand;

                    const rating = Number(product.ratingAvg || 0);
                    const matchesRating = rating >= state.ratingMin;

                    const deliveryDays = Number(product.deliveryEtaDays || 3);
                    const matchesDelivery = state.deliveryMax === 0 || deliveryDays <= state.deliveryMax;

                    const matchesStock = !state.inStockOnly || getStock(product) > 0;

                    const matchesFeatures = state.selectedFeatures.size === 0 || Array.from(state.selectedFeatures).every(feat => {
                        const productFeatures = product.features || [];
                        const productSpecs = product.specifications || {};
                        const searchString = JSON.stringify(product).toLowerCase();
                        return productFeatures.includes(feat) || 
                               Object.values(productSpecs).includes(feat) || 
                               searchString.includes(feat.toLowerCase());
                    });

                    return matchesSearch && matchesCategory && minOk && maxOk && matchesWishlist && matchesBrand && matchesRating && matchesDelivery && matchesStock && matchesFeatures;
                });


                if (state.sort === 'price-asc') {
                    state.filtered.sort((a, b) => Number(a.price || 0) - Number(b.price || 0));
                } else if (state.sort === 'price-desc') {
                    state.filtered.sort((a, b) => Number(b.price || 0) - Number(a.price || 0));
                } else if (state.sort === 'newest') {
                    state.filtered.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
                } else if (state.sort === 'name-asc') {
                    state.filtered.sort((a, b) => String(a.name || '').localeCompare(String(b.name || '')));
                }
            };

            const renderRecent = () => {
                if (!recentSection || !recentGrid) return;

                if (!window.getAuthToken || !window.getAuthToken()) {
                    recentSection.classList.add('hidden');
                    recentGrid.innerHTML = '';
                    return;
                }

                if (!recentProductsLoaded) {
                    if (!recentProductsLoading) {
                        recentProductsLoading = (async () => {
                            try {
                                const token = window.getAuthToken();
                                const response = await fetch(`${window.API_BASE_URL}/orders/myorders`, {
                                    headers: { 'Authorization': `Bearer ${token}` }
                                });

                                if (!response.ok) {
                                    recentProductsCache = [];
                                    return;
                                }

                                const orders = await response.json();
                                const seen = new Set();
                                const collected = [];

                                (Array.isArray(orders) ? orders : []).forEach((order) => {
                                    const items = Array.isArray(order.orderItems) ? order.orderItems : Array.isArray(order.items) ? order.items : [];
                                    items.forEach((item) => {
                                        const productId = item._id || item.id || item.productId || item.product_id;
                                        const key = productId ? String(productId) : '';
                                        if (!key || seen.has(key)) return;
                                        seen.add(key);
                                        const liveProduct = productMap.get(key) || item;
                                        collected.push(liveProduct);
                                    });
                                });

                                recentProductsCache = collected.slice(0, 6);
                            } catch (error) {
                                console.error('Failed to load recent products from orders:', error);
                                recentProductsCache = [];
                            } finally {
                                recentProductsLoaded = true;
                                recentProductsLoading = null;
                                renderRecent();
                            }
                        })();
                    }
                    recentSection.classList.add('hidden');
                    return;
                }

                if (recentProductsCache.length === 0) {
                    recentSection.classList.add('hidden');
                    recentGrid.innerHTML = '';
                    return;
                }

                recentSection.classList.remove('hidden');
                recentGrid.innerHTML = recentProductsCache.map(renderProduct).join('');
            };

            const render = () => {
                applyFilters();

                const total = state.filtered.length;
                if (productCount) productCount.textContent = `${total} Units Available`;

                const start = (state.currentPage - 1) * state.itemsPerPage;
                const end = start + state.itemsPerPage;
                const pageItems = state.filtered.slice(start, end);

                productsGrid.innerHTML = pageItems.length
                    ? pageItems.map(renderProduct).join('')
                    : '<p class="text-white text-center col-span-full">No products found.</p>';

                renderPagination();
                renderRecent();
                updateCompareBar();

                if (window.lucide) lucide.createIcons();
            };

            const addProductToCart = (productId, qty) => {
                const product = productMap.get(String(productId));
                if (!product) return;
                const quantity = Math.max(1, Number(qty || 1));
                for (let i = 0; i < quantity; i += 1) {
                    window.addToCart(product);
                }
            };

            productsGrid.addEventListener('click', (event) => {
                const target = event.target.closest('button');
                if (!target) return;

                const productId = target.dataset.productId;
                if (!productId) return;

                if (target.classList.contains('add-to-cart-btn')) {
                    addProductToCart(productId, 1);
                }

                if (target.classList.contains('quick-add-btn')) {
                    const qtyInput = productsGrid.querySelector(`.qty-input[data-product-id="${productId}"]`);
                    addProductToCart(productId, qtyInput ? qtyInput.value : 1);
                }

                if (target.classList.contains('wishlist-btn')) {
                    const key = String(productId);
                    if (state.wishlist.has(key)) {
                        state.wishlist.delete(key);
                    } else {
                        state.wishlist.add(key);
                    }
                    if (window.saveWishlistIds) {
                        window.saveWishlistIds(Array.from(state.wishlist));
                    }
                    if (window.updateWishlistDisplay) window.updateWishlistDisplay();
                    render();
                }

                if (target.classList.contains('compare-btn')) {
                    const key = String(productId);
                    if (state.compare.has(key)) {
                        state.compare.delete(key);
                    } else {
                        state.compare.add(key);
                    }
                    if (window.saveCompareIds) {
                        window.saveCompareIds(Array.from(state.compare));
                    }
                    updateCompareBar();
                    render();
                }
            });

            const handleFilterChange = () => {
                state.search = searchInput.value || '';
                state.sort = sortSelect.value || 'featured';
                state.priceMin = priceMinInput.value ? Number(priceMinInput.value) : null;
                state.priceMax = priceMaxInput.value ? Number(priceMaxInput.value) : null;
                state.brand = brandSelect.value || 'all';
                state.ratingMin = Number(ratingMinSelect.value || 0);
                state.deliveryMax = Number(deliveryMaxSelect.value || 0);
                state.inStockOnly = inStockOnlyInput.checked;
                state.wishlistOnly = wishlistOnlyInput.checked;
                state.currentPage = 1;
                render();
            };

            searchInput.addEventListener('input', handleFilterChange);
            sortSelect.addEventListener('change', handleFilterChange);
            priceMinInput.addEventListener('input', handleFilterChange);
            priceMaxInput.addEventListener('input', handleFilterChange);
            brandSelect.addEventListener('change', handleFilterChange);
            ratingMinSelect.addEventListener('change', handleFilterChange);
            deliveryMaxSelect.addEventListener('change', handleFilterChange);
            inStockOnlyInput.addEventListener('change', handleFilterChange);
            wishlistOnlyInput.addEventListener('change', handleFilterChange);

            if (window.addEventListener) {
                window.addEventListener('wishlistUpdated', () => {
                    state.wishlist = new Set((window.getWishlistIds ? window.getWishlistIds() : []).map(String));
                    render();
                });
                window.addEventListener('compareUpdated', () => {
                    state.compare = new Set((window.getCompareIds ? window.getCompareIds() : []).map(String));
                    updateCompareBar();
                    render();
                });
            }

            clearFiltersBtn.addEventListener('click', () => {
                searchInput.value = '';
                sortSelect.value = 'featured';
                priceMinInput.value = '';
                priceMaxInput.value = '';
                brandSelect.value = 'all';
                ratingMinSelect.value = '0';
                deliveryMaxSelect.value = '0';
                inStockOnlyInput.checked = false;
                wishlistOnlyInput.checked = false;
                state.category = 'all';
                state.selectedFeatures.clear();
                featuresList.querySelectorAll('.feature-checkbox').forEach(cb => cb.checked = false);
                renderFeatureChips();
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                const allCategoryBtn = document.querySelector('.category-btn[data-category="all"]');
                if (allCategoryBtn) allCategoryBtn.classList.add('active');
                handleFilterChange();
            });


            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state.category = btn.dataset.category;
                    state.currentPage = 1;
                    render();
                });
            });

            compareGo.addEventListener('click', () => {
                const ids = Array.from(state.compare);
                if (ids.length < 2) {
                    window.showMessage('info', 'Select at least two products to compare.');
                    return;
                }
                window.location.href = `compare.html?ids=${ids.join(',')}`;
            });

            const brands = Array.from(new Set(allProducts.map(p => p.brand || 'Tech Turf'))).sort();
            brands.forEach((brand) => {
                const option = document.createElement('option');
                option.value = brand;
                option.textContent = brand;
                brandSelect.appendChild(option);
            });

            render();
        });
    </script>

    <!-- 🛒 SHOP QUICK CONTROLS (Always Visible) -->
    <div class="shop-floating-controls reveal-hidden">
        <a href="wishlist.html" class="shop-control-btn transition-link">
            <i data-lucide="heart"></i>
            <span>Wishlist</span>
            <div class="wishlist-count count-badge hidden">0</div>
        </a>
        <a href="cart.html" class="shop-control-btn transition-link">
            <i data-lucide="shopping-bag"></i>
            <span>Cart</span>
            <div class="cart-count count-badge hidden">0</div>
        </a>
    </div>

    <style>
        /* Trigger reveal animation for the bar immediately or via scroll */
        .shop-floating-controls.reveal-hidden {
             opacity: 1;
             visibility: visible;
        }
    </style>
</body>
