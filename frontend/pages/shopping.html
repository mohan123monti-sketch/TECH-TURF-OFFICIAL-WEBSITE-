<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace - Tech Turf</title>

    <!-- External Libraries -->
    <link rel="stylesheet" href="/src/css/tailwind.generated.css">
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Styles & Scripts -->
    <link rel="stylesheet" href="/src/css/brutalist.css">
    <script src="/src/js/features/shop-logic.js" defer></script>
    <script src="/src/js/core/layout.js" defer></script>
</head>

<body data-page="shopping.html">

    <!-- Header Container -->
    <div id="header-container"></div>

    <main class="split-screen">
        <!-- Background Watermark -->
        <div class="watermark">SHOP</div>

        <!-- LEFT SIDE: Information Zone -->
        <section class="info-zone">
            <!-- Top Metadata -->
            <div class="metadata">
                INVENTORY: SYNCED<br>
                DISTRIBUTION: GLOBAL / AUTONOMOUS
            </div>

            <!-- Center Content -->
            <div class="center-content">
                <h1 class="welcome-headline">MARKET</h1>
                <p class="subheading">Strategic Hardware & Global Engineering Nodes. Acquire high-performance assets from our specialized divisions.</p>
                <div class="category-list mt-8 flex gap-6 overflow-x-auto pb-4 no-scrollbar">
                    <button class="category-btn active text-[10px] font-black uppercase tracking-widest border-b-2 border-black pb-1" data-category="all">ALL MODULES</button>
                    <button class="category-btn text-[10px] font-black uppercase tracking-widest border-b-2 border-transparent pb-1 opacity-40" data-category="Tech Turf">TECH TURF</button>
                    <button class="category-btn text-[10px] font-black uppercase tracking-widest border-b-2 border-transparent pb-1 opacity-40" data-category="Quinta">QUINTA</button>
                    <button class="category-btn text-[10px] font-black uppercase tracking-widest border-b-2 border-transparent pb-1 opacity-40" data-category="Trend Hive">TREND HIVE</button>
                </div>
            </div>

            <!-- Bottom Navigation -->
            <div class="bottom-nav">
                MANIFEST / 03
            </div>
        </section>

        <!-- RIGHT SIDE: Visual Focal Zone -->
        <section class="focal-zone">
            <img src="/assets/logos/tech-turf.png" alt="Tech Turf" class="logo-hero">
        </section>
    </main>

    <section class="page-content">
        <div class="flex justify-between items-end mb-16">
            <h2 class="section-title mb-0">High-Performance Assets</h2>
            <div class="flex gap-4">
                <input id="search-input" type="text" placeholder="SEARCH MODULES" class="bg-transparent border-b-2 border-black/10 py-2 outline-none focus:border-black font-bold uppercase text-[10px] tracking-widest transition-all w-64">
                <select id="sort-select" class="bg-transparent border-b-2 border-black/10 py-2 outline-none focus:border-black font-bold uppercase text-[10px] tracking-widest transition-all">
                    <option value="featured">FEATURED</option>
                    <option value="price-asc">PRICE: LOW-HIGH</option>
                    <option value="price-desc">PRICE: HIGH-LOW</option>
                </select>
            </div>
        </div>
        
        <div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-1">
            <!-- Products will be injected here by shop-logic.js -->
        </div>
    </section>

    <!-- Floating Cart/Wishlist for Shop -->
    <div class="fixed bottom-8 right-8 z-[100] flex gap-4">
        <a href="cart.html" class="w-16 h-16 bg-black text-white flex items-center justify-center rounded-none hover:bg-gray-800 transition-all font-black text-xs">CART</a>
        <a href="wishlist.html" class="w-16 h-16 bg-white border-2 border-black text-black flex items-center justify-center rounded-none hover:bg-gray-100 transition-all font-black text-xs">HEART</a>
    </div>

    <div id="notification-container" class="fixed top-24 right-6 z-[100] flex flex-col gap-4 pointer-events-none"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) lucide.createIcons();
            // Category button listener
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.category-btn').forEach(b => {
                        b.classList.remove('active', 'opacity-100');
                        b.classList.add('opacity-40');
                        b.style.borderColor = 'transparent';
                    });
                    btn.classList.add('active', 'opacity-100');
                    btn.classList.remove('opacity-40');
                    btn.style.borderColor = 'black';
                });
            });
        });
    </script>
</body>

</html>
