<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Tech Turf - Secure Access</title>

    <!-- External Libraries -->
    <link rel="stylesheet" href="/src/css/tailwind.generated.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Our New Centralized Files -->
    <link rel="stylesheet" href="/src/css/pages/style.css">
    <link rel="icon" href="data:,">
    <script src="/src/js/core/layout.js" defer></script>

    <style>
        body {
            background-color: #000;
            overflow: hidden;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 3D Container */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: radial-gradient(circle at center, #0a0a1a 0%, #000000 100%);
        }

        .auth-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            padding: 24px;
            perspective: 2000px;
        }

        .auth-card {
            padding: 64px 48px;
            transform-style: preserve-3d;
            transition: transform 0.6s var(--transition-curve);
        }

        .input-group {
            position: relative;
            margin-bottom: 24px;
        }

        .input-group input {
            width: 100%;
            padding: 20px 24px;
            padding-left: 64px;
            padding-right: 64px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.5rem;
            color: white;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.4s var(--transition-curve);
            outline: none;
            letter-spacing: 0.5px;
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .input-group .absolute-icon {
            position: absolute;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.2);
            pointer-events: none;
            transition: all 0.4s var(--transition-curve);
            z-index: 20;
            width: 18px;
            height: 18px;
        }

        .input-group .toggle-password {
            position: absolute;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.4s var(--transition-curve);
            z-index: 30;
            background: none;
            border: none;
            padding: 0;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-group .toggle-password:hover {
            color: white;
            transform: translateY(-50%) scale(1.1);
        }

        .input-group input:focus~.absolute-icon {
            color: white;
            transform: translateY(-50%) scale(1.1);
        }

        .auth-btn {
            width: 100%;
            padding: 20px;
            background: white;
            color: black;
            border-radius: 1.5rem;
            font-weight: 900;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.4s var(--transition-curve);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border: none;
            margin-top: 32px;
        }

        .auth-btn:hover {
            transform: translateY(-4px);
            background: #f0f0f0;
            box-shadow: 0 20px 40px rgba(255, 255, 255, 0.1);
        }

        .auth-btn:active {
            transform: translateY(-2px);
        }

        .title-gradient {
            font-size: 3.5rem;
            font-weight: 950;
            text-align: center;
            margin-bottom: 8px;
            color: white;
            letter-spacing: -0.05em;
            line-height: 0.85;
            text-transform: uppercase;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.4);
            font-size: 9px;
            font-weight: 900;
            border-radius: 9999px;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            margin-bottom: 40px;
        }
    </style>
</head>

<body>
    <!-- 3D Canvas Background -->
    <div id="canvas-container"></div>

    <!-- Login Form -->
    <div class="auth-container">
        <div class="auth-card tilt-element text-center iphone-glass rounded-[3.5rem] border border-white/5 shadow-3xl">
            <div
                class="inline-flex items-center gap-3 px-5 py-2.5 rounded-full border border-white/10 iphone-glass text-white/50 text-[9px] font-black tracking-[0.3em] mb-12 animate-float uppercase">
                <span class="w-1.5 h-1.5 rounded-full bg-orange-500 animate-ping"></span>
                Verification Protocol v2.5
            </div>

            <h1 class="text-6xl md:text-7xl font-black tracking-tighter text-white uppercase leading-none mb-4">
                Secure<br><span class="text-white/20">Access</span>
            </h1>
            <p class="text-white/40 text-center mb-16 text-[10px] font-black tracking-[0.4em] uppercase mt-4">
                Encrypted Auth Channel</p>

            <form id="signin-form" class="space-y-6">
                <div class="input-group">
                    <input type="email" id="email" required placeholder="Email Address"
                        class="glass-input w-full px-8 py-5 bg-white/5 border border-white/10 rounded-2xl text-white outline-none focus:border-white/30 transition-all text-sm font-medium">
                    <i data-lucide="mail" class="absolute-icon"></i>
                </div>

                <div class="input-group">
                    <input type="password" id="password" required placeholder="Access Key"
                        class="glass-input w-full px-8 py-5 bg-white/5 border border-white/10 rounded-2xl text-white outline-none focus:border-white/30 transition-all text-sm font-medium">
                    <i data-lucide="lock" class="absolute-icon"></i>
                    <button type="button" class="toggle-password" onclick="window.togglePasswordVisibility('password', this)">
                        <i data-lucide="eye" class="w-4 h-4"></i>
                    </button>
                </div>

                <div class="flex justify-between items-center py-4 text-sm px-2">
                    <a href="register.html"
                        class="text-[10px] text-orange-500 hover:text-orange-400 transition-colors font-black uppercase tracking-widest">Register
                        ID</a>
                    <a href="#" id="forgot-password-link"
                        onclick="window.showMessage('info', 'Recovery protocol requires manual admin verification. Contact support.'); return false;"
                        class="text-[10px] text-white/20 hover:text-white/40 transition-colors uppercase tracking-widest font-black">Lost
                        Key?</a>
                </div>

                <button type="submit" id="signin-button"
                    class="magnetic-btn w-full bg-white text-black py-6 text-[11px] rounded-2xl font-black uppercase tracking-[0.3em] hover:bg-gray-200 transition-all shadow-2xl shadow-white/5 mt-8 flex items-center justify-center gap-4">
                    <span>Initiate Link</span>
                    <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </form>
        </div>
    </div>

    <div id="message-container"></div>

    <script>
        // --- 3D Background Logic (Volumetric Deep Space Particles) ---
        const loginContainer = document.getElementById('canvas-container');
        const loginScene = new THREE.Scene();
        loginScene.fog = new THREE.FogExp2(0x050510, 0.001);

        const loginCamera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 3000);
        loginCamera.position.z = 1000;

        const loginRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        loginRenderer.setSize(window.innerWidth, window.innerHeight);
        loginRenderer.setPixelRatio(window.devicePixelRatio);
        loginContainer.appendChild(loginRenderer.domElement);

        function getTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            const context = canvas.getContext('2d');
            const gradient = context.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.2, 'rgba(255,255,255,0.8)');
            gradient.addColorStop(0.5, 'rgba(255,255,255,0.2)');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            context.fillStyle = gradient;
            context.fillRect(0, 0, 32, 32);
            const texture = new THREE.Texture(canvas);
            texture.needsUpdate = true;
            return texture;
        }

        const particleTexture = getTexture();

        // Stars
        const starGeo = new THREE.BufferGeometry();
        const starCount = 6000;
        const starPos = [];
        for (let i = 0; i < starCount; i++) {
            starPos.push((Math.random() - 0.5) * 3000, (Math.random() - 0.5) * 3000, (Math.random() - 0.5) * 3000);
        }
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 1.5, sizeAttenuation: false, transparent: true, opacity: 0.8 }));
        loginScene.add(stars);

        // Dust
        const dustGeo = new THREE.BufferGeometry();
        const dustCount = 2000;
        const dustPos = [];
        const dustColors = [];
        const colorPalette = [new THREE.Color('#ea580c'), new THREE.Color('#3b82f6'), new THREE.Color('#ffffff')];
        for (let i = 0; i < dustCount; i++) {
            dustPos.push((Math.random() - 0.5) * 2500, (Math.random() - 0.5) * 2500, (Math.random() - 0.5) * 2500);
            const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
            dustColors.push(color.r, color.g, color.b);
        }
        dustGeo.setAttribute('position', new THREE.Float32BufferAttribute(dustPos, 3));
        dustGeo.setAttribute('color', new THREE.Float32BufferAttribute(dustColors, 3));
        const dust = new THREE.Points(dustGeo, new THREE.PointsMaterial({ size: 4, map: particleTexture, vertexColors: true, transparent: true, opacity: 0.6, depthWrite: false, blending: THREE.AdditiveBlending }));
        loginScene.add(dust);

        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX - window.innerWidth / 2);
            mouseY = (e.clientY - window.innerHeight / 2);
            const card = document.querySelector('.tilt-element');
            if (card) {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 40;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 40;
                card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            stars.rotation.y += 0.0001;
            dust.rotation.y += 0.0003;
            loginCamera.position.x += (mouseX * 0.2 - loginCamera.position.x) * 0.02;
            loginCamera.position.y += (-mouseY * 0.2 - loginCamera.position.y) * 0.02;
            loginCamera.lookAt(loginScene.position);
            loginRenderer.render(loginScene, loginCamera);
        }
        animate();

        window.addEventListener('resize', () => {
            loginCamera.aspect = window.innerWidth / window.innerHeight;
            loginCamera.updateProjectionMatrix();
            loginRenderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Auth Logic
        // Auth Logic
        document.addEventListener('DOMContentLoaded', () => {
            // Fallback so login never crashes if shared layout script fails to initialize first.
            if (typeof window.showMessage !== 'function') {
                window.showMessage = (type, message) => {
                    const container = document.getElementById('message-container') || document.body;
                    const item = document.createElement('div');
                    item.className = 'fixed top-4 right-4 z-[9999] px-4 py-2 rounded-lg bg-black/80 border border-white/20 text-white text-xs';
                    item.textContent = message;
                    container.appendChild(item);
                    setTimeout(() => item.remove(), 2800);
                };
            }

            // Safety Check for dependencies
            if (typeof window.API_BASE_URL === 'undefined' || window.API_BASE_URL === '/api' || window.API_BASE_URL.includes('8080')) {
                window.API_BASE_URL = 'http://localhost:5000/api';
            }

            const signinForm = document.getElementById('signin-form');
            const signinButton = document.getElementById('signin-button');
            const btnText = signinButton.querySelector('span');

            // View State Variables
            let currentView = 'login'; // login, 2fa, forgot-request, forgot-reset
            let userEmail = '';

            const updateUIForState = (state) => {
                currentView = state;
                const title = document.querySelector('h1');
                const subtitle = document.querySelector('p.text-white\\/40');
                const registerLink = document.querySelector('a[href="register.html"]');
                const forgotLink = document.getElementById('forgot-password-link');
                const inputs = document.querySelectorAll('.input-group');

                // Clear existing inputs
                document.getElementById('password').value = '';

                if (state === '2fa') {
                    title.innerHTML = `Shield<br><span class="text-white/20">Sync</span>`;
                    subtitle.textContent = 'Neural Verification Required';
                    btnText.textContent = 'Confirm Protocol';

                    // Show OTP, hide others
                    inputs[0].innerHTML = `
                         <input type="text" id="otp" required placeholder="6-digit OTP" maxlength="6"
                            class="glass-input w-full px-8 py-5 bg-white/5 border border-white/10 rounded-2xl text-white outline-none focus:border-white/30 transition-all text-center font-black tracking-[0.8em] text-xl">
                         <i data-lucide="shield-check" class="absolute-icon"></i>`;

                    inputs[1].innerHTML = `
                        <div class="flex flex-col gap-2 mt-2">
                             <a href="#" onclick="toggleBackup(true)" class="text-[9px] text-white/30 hover:text-white uppercase tracking-widest font-black text-center">Use Emergency Backup Code</a>
                        </div>`;

                    lucide.createIcons();
                } else if (state === 'forgot-request') {
                    title.innerHTML = `Recover<br><span class="text-white/20">Link</span>`;
                    subtitle.textContent = 'Enter ID for Transmission';
                    btnText.textContent = 'Send Reset Code';
                    inputs[1].style.display = 'none';
                    forgotLink.textContent = 'Back to Login';
                    forgotLink.onclick = () => { window.location.reload(); return false; };
                } else if (state === 'forgot-reset') {
                    title.innerHTML = `Secure<br><span class="text-white/20">Reset</span>`;
                    subtitle.textContent = 'Apply New Access Key';
                    btnText.textContent = 'Update Protocol';

                    inputs[0].innerHTML = `
                         <input type="text" id="otp-reset" required placeholder="OTP Code" maxlength="6"
                            class="glass-input w-full px-8 py-5 bg-white/5 border border-white/10 rounded-2xl text-white outline-none focus:border-white/30 transition-all text-center tracking-[0.4em]">
                         <i data-lucide="key" class="absolute-icon"></i>`;

                    inputs[1].innerHTML = `
                         <input type="password" id="new-password" required placeholder="New Access Key"
                            class="glass-input w-full px-8 py-5 bg-white/5 border border-white/10 rounded-2xl text-white outline-none focus:border-white/30 transition-all">
                         <i data-lucide="lock" class="absolute-icon"></i>
                         <button type="button" class="toggle-password" onclick="window.togglePasswordVisibility('new-password', this)">
                            <i data-lucide="eye" class="w-4 h-4"></i>
                         </button>`;

                    lucide.createIcons();
                }
            };
            window.updateUIForState = updateUIForState;

            window.toggleBackup = (show) => {
                const inputs = document.querySelectorAll('.input-group');
                if (show) {
                    inputs[0].innerHTML = `
                         <input type="text" id="backup-code" required placeholder="Backup Code"
                            class="glass-input w-full px-8 py-5 bg-white/5 border border-orange-500/30 rounded-2xl text-white outline-none focus:border-orange-500/60 transition-all text-center font-mono uppercase tracking-[0.2em]">
                         <i data-lucide="life-buoy" class="absolute-icon"></i>`;
                    inputs[1].innerHTML = `
                        <div class="flex flex-col gap-2 mt-2">
                             <a href="#" onclick="updateUIForState('2fa')" class="text-[9px] text-white/30 hover:text-white uppercase tracking-widest font-black text-center">Back to OTP</a>
                        </div>`;
                } else {
                    updateUIForState('2fa');
                }
                lucide.createIcons();
            };

            // Override forgot password link
            document.getElementById('forgot-password-link').onclick = (e) => {
                e.preventDefault();
                updateUIForState('forgot-request');
            };

            // Password Visibility Toggle
            window.togglePasswordVisibility = (inputId, btn) => {
                const input = document.getElementById(inputId);
                const icon = btn.querySelector('i');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.setAttribute('data-lucide', 'eye-off');
                } else {
                    input.type = 'password';
                    icon.setAttribute('data-lucide', 'eye');
                }
                if (window.lucide) lucide.createIcons();
            };

            signinForm.addEventListener('submit', async function (e) {
                e.preventDefault();
                signinButton.disabled = true;
                const originalBtnText = btnText.textContent;
                btnText.textContent = 'Processing...';

                try {
                    const emailInput = document.getElementById('email');
                    const passInput = document.getElementById('password');

                    if (currentView === 'login') {
                        userEmail = emailInput.value.trim();
                        const response = await fetch(`${window.API_BASE_URL}/auth/login`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email: userEmail, password: passInput.value }),
                        });

                        const data = await response.json();
                        if (!response.ok) throw new Error(data.message || 'Verification Failed');

                        if (data.twoFactorRequired) {
                            window.showMessage('info', '2-Step Verification Active. Check Email.');
                            updateUIForState('2fa');
                        } else {
                            finalizeLogin(data);
                        }
                    } else if (currentView === '2fa') {
                        const otp = document.getElementById('otp')?.value;
                        const backup = document.getElementById('backup-code')?.value;

                        const response = await fetch(`${window.API_BASE_URL}/auth/otp/verify-2step`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email: userEmail, otp, backupCode: backup }),
                        });

                        const data = await response.json();
                        if (!response.ok) throw new Error(data.message || 'Invalid Protocol Code');
                        finalizeLogin(data);
                    } else if (currentView === 'forgot-request') {
                        userEmail = emailInput.value.trim();
                        const response = await fetch(`${window.API_BASE_URL}/auth/forgot-password`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email: userEmail }),
                        });
                        const data = await response.json();
                        if (!response.ok) throw new Error(data.message || 'Request Failed');

                        window.showMessage('success', 'Reset code transmitted.');
                        updateUIForState('forgot-reset');
                    } else if (currentView === 'forgot-reset') {
                        const otp = document.getElementById('otp-reset').value;
                        const newPassword = document.getElementById('new-password').value;

                        const response = await fetch(`${window.API_BASE_URL}/auth/reset-password`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email: userEmail, otp, newPassword }),
                        });
                        const data = await response.json();
                        if (!response.ok) throw new Error(data.message || 'Reset Protocol Error');

                        window.showMessage('success', 'Neural key updated. Re-authenticating...');
                        setTimeout(() => window.location.reload(), 1500);
                    }
                } catch (err) {
                    window.showMessage('error', err.message);
                } finally {
                    signinButton.disabled = false;
                    btnText.textContent = originalBtnText;
                }
            });

            function finalizeLogin(data) {
                window.showMessage('success', 'Link Established. Finalizing Sync...');
                localStorage.setItem('tt_token', data.token);
                localStorage.setItem('tt_user', JSON.stringify(data.user));
                setTimeout(() => {
                    window.location.href = (data.user && data.user.isAdmin) ? '/admin/dashboard.html' : '/index.html';
                }, 1200);
            }

            // Social Login Callback Override
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const twoFactor = urlParams.get('twoFactorRequired');
            
            if (twoFactor === 'true') {
                userEmail = urlParams.get('email');
                updateUIForState('2fa');
            } else if (token) {
                finalizeLogin({ token, user: JSON.parse(urlParams.get('user') || '{}') });
            }
        });
        window.addEventListener('load', () => { if (window.lucide) lucide.createIcons(); });
    </script>

    <!-- Social Login Integration -->
    <script src="/src/js/features/social-login.js?v=2.1"></script>
</body>

</html>
