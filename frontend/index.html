<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECH TURF - WELCOME</title>

    <!-- External Libraries -->
    <link rel="stylesheet" href="/src/css/tailwind.generated.css">
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Styles & Scripts -->
    <link rel="stylesheet" href="/src/css/brutalist.css">
    <script src="/src/js/core/layout.js" defer></script>
</head>

<body data-page="Home" data-3d-enabled="false">

    <!-- Navbar Target -->
    <div id="header-container"></div>

    <main class="split-screen">
        <!-- Background Watermark -->
        <div class="watermark">TECH TURF</div>

        <!-- LEFT SIDE: Information Zone -->
        <section class="info-zone">
            <!-- Top Metadata -->
            <div class="metadata">
                STATUS: AVAILABLE<br>
                TECH: AI / UI/UX / WEB
            </div>

            <!-- Center Content -->
            <div class="center-content">
                <h1 class="welcome-headline">WELCOME</h1>
                <p class="subheading">Smart Tech for a Connected World. We architect the future through specialized digital kinetics and autonomous systems.</p>
            </div>

            <!-- Bottom Navigation -->
            <div class="bottom-nav">
                PREV 01 / 04 NEXT
            </div>
        </section>

        <!-- RIGHT SIDE: Visual Focal Zone -->
        <section class="focal-zone">
            <img src="/assets/logos/tech-turf.png" alt="Tech Turf Logo" class="focal-logo">
        </section>
    </main>

    <!-- Modal/Notification Container (for layout.js) -->
    <div id="notification-container" class="fixed top-24 right-6 z-[100] flex flex-col gap-4 pointer-events-none"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Minimal initialization for Lucide icons
            if (window.lucide) lucide.createIcons();
            
            // Note: layout.js will automatically populate #header-container
            // We overrides its styles in welcome.css to fit the brutalist aesthetic.
        });
    </script>
</body>

</html>
